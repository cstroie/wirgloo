<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="wirgloo — self-hosted web IRC client. Single Go binary, no dependencies.">
  <meta name="theme-color" content="#13141a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f1f2f6" media="(prefers-color-scheme: light)">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>wirgloo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="connect-screen">
    <header id="connect-header">
      <button id="connect-theme-btn" title="Toggle theme" aria-label="Toggle theme">☀</button>
    </header>
    <main>
    <div class="connect-box">
      <h1>wirgloo</h1>
      <p class="subtitle">Web IRC Client</p>
      <div id="connect-error" class="error-msg hidden" role="alert"></div>
      <form id="connect-form">
        <div class="field">
          <label for="network">Network</label>
          <div class="select-row">
          <select id="network">
            <option value="libera">Libera.Chat</option>
            <option value="oftc">OFTC</option>
            <option value="rizon">Rizon</option>
            <option value="efnet">EFnet</option>
            <option value="quakenet">QuakeNet</option>
            <option value="dalnet">DALnet</option>
            <option value="undernet">Undernet</option>
            <option value="ircnet">IRCnet</option>
            <option value="geekshed">GeekShed</option>
            <option value="radiochat">RadioChat</option>
            <option value="sdf">SDF</option>
            <option value="tildechat">tilde.chat</option>
            <option value="hackint">hackint</option>
            <option value="espernet">EsperNet</option>
            <option value="custom">Custom…</option>
          </select>
          <button type="button" id="delete-profile-btn" class="hidden" title="Delete saved profile" aria-label="Delete saved profile">×</button>
          </div>
        </div>
        <div class="field hidden" id="server-field">
          <label for="server">Server</label>
          <input type="text" id="server" value="irc.libera.chat">
        </div>
        <div class="field-row">
          <div class="field" style="flex:0 0 auto">
            <label for="port">Port</label>
            <input type="number" id="port" value="6697" min="1" max="65535" style="width:80px">
          </div>
          <div class="field toggle-field">
            <label for="tls">TLS</label>
            <label class="toggle">
              <input type="checkbox" id="tls" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="field toggle-field" id="noverify-field">
            <label for="noverify">No verify</label>
            <label class="toggle">
              <input type="checkbox" id="noverify">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="field">
          <label for="nick">Nickname</label>
          <div class="input-with-btn">
            <input type="text" id="nick" placeholder="yournick" required>
            <button type="button" id="nick-suggest-btn" title="Suggest a nick" aria-label="Suggest a nick">&#x21BA;</button>
          </div>
        </div>
        <div class="field">
          <label for="realname">Real Name <span class="field-optional">(optional)</span></label>
          <input type="text" id="realname" placeholder="Your Name" oninput="this.dataset.suggested=''">
        </div>
        <div class="field">
          <label for="auth-method">Authentication</label>
          <select id="auth-method">
            <option value="none">None</option>
            <option value="sasl">SASL PLAIN</option>
            <option value="nickserv">NickServ IDENTIFY</option>
            <option value="nickserv_cmd">NickServ (NICKSERV command)</option>
            <option value="server">Server password (/PASS)</option>
            <option value="cservice">CService (Undernet X bot)</option>
          </select>
        </div>
        <div class="field hidden" id="pass-field">
          <label for="pass">Password</label>
          <input type="password" id="pass" placeholder="password" autocomplete="current-password">
        </div>
        <button type="submit" id="connect-btn" aria-label="Connect to server">Connect</button>
      </form>
      <footer>
        <small id="connect-version" class="app-version"></small>
      </footer>
    </div>
    </main>
  </div>

  <div id="panel-backdrop" class="hidden"></div>
  <div id="chat-screen" class="hidden">
    <nav id="sidebar">
      <header id="sidebar-header">
        <span id="conn-dot" class="conn-dot" title="Disconnected" aria-label="Connection status: disconnected"></span>
        <div class="header-btns">
          <button id="theme-btn" title="Toggle theme" aria-label="Toggle theme">☀</button>
          <button id="settings-btn" title="Settings" aria-label="Settings">⚙</button>
        </div>
      </header>
      <div id="channel-list" role="list" aria-label="Channels"></div>
      <footer id="sidebar-footer">
        <button id="list-btn" aria-label="List channels">≡ List</button>
        <button id="join-btn" aria-label="Join channel">+ Join</button>
        <button id="away-btn" aria-label="Toggle away status">⏾ Away</button>
        <button id="nick-btn" title="Change nick" aria-label="Change nick">✎ Nick</button>
        <button id="disconnect-btn" aria-label="Disconnect from server">⏏ Disconnect</button>
      </footer>
      <small id="sidebar-version" class="app-version"></small>
    </nav>

    <main id="main">
      <header id="topic-bar">
        <button id="sidebar-toggle" class="panel-toggle" title="Channels" aria-label="Show channels sidebar">☰</button>
        <span id="target-name"></span>
        <span id="topic-text"></span>
        <button id="userlist-toggle" class="panel-toggle" title="Users" aria-label="Show users panel">◉</button>
      </header>
      <div id="list-sort-bar" class="hidden" role="toolbar" aria-label="Sort and filter channels">
        <span class="sort-label">Sort by</span>
        <button class="sort-btn" data-sort="users" aria-label="Sort by users">Users ↓</button>
        <button class="sort-btn" data-sort="name" aria-label="Sort by name">Name</button>
        <button class="sort-btn" data-sort="topic" aria-label="Sort by topic">Topic</button>
        <input type="search" id="list-filter" placeholder="Filter channels…" autocomplete="off" spellcheck="false" aria-label="Filter channels">
      </div>
      <div id="messages-wrap">
        <div id="messages" role="log" aria-label="Chat messages" aria-live="polite"></div>
        <button id="scroll-bottom" aria-label="Scroll to bottom">↓</button>
        <aside id="settings-panel" aria-label="Settings">
          <section id="settings-body">
            <span class="settings-section">Appearance</span>
          <div class="settings-group">
            <label class="settings-label" for="palette-select">Theme</label>
            <select id="palette-select" class="settings-input">
              <option value="default">Default</option>
              <option value="vscode">VSCode</option>
              <option value="mirc">mIRC</option>
              <option value="retro">Retro</option>
              <option value="material">Material</option>
              <option value="solarized">Solarized</option>
              <option value="catppuccin">Catppuccin</option>
              <option value="dracula">Dracula</option>
              <option value="gruvbox">Gruvbox</option>
              <option value="nord">Nord</option>
              <option value="one">One</option>
              <option value="tango">Tango</option>
            </select>
          </div>
          <div class="settings-group">
            <span class="settings-label">Layout</span>
            <div class="settings-options">
              <button class="settings-option" data-setting="layout" data-value="fluid">Full width</button>
              <button class="settings-option" data-setting="layout" data-value="contained">Contained</button>
            </div>
          </div>
          <div class="settings-group">
            <span class="settings-label">Font size</span>
            <div class="settings-options">
              <button class="settings-option" data-setting="font" data-value="small">Small</button>
              <button class="settings-option" data-setting="font" data-value="medium">Medium</button>
              <button class="settings-option" data-setting="font" data-value="large">Large</button>
            </div>
          </div>
          <div class="settings-group">
            <span class="settings-label">IRC colours</span>
            <div class="settings-options">
              <button class="settings-option" data-setting="stripcolors" data-value="off">Show</button>
              <button class="settings-option" data-setting="stripcolors" data-value="on">Hide</button>
            </div>
          </div>
          <div class="settings-group">
            <span class="settings-label">Markdown</span>
            <div class="settings-options">
              <button class="settings-option" data-setting="markdown" data-value="on">On</button>
              <button class="settings-option" data-setting="markdown" data-value="off">Off</button>
            </div>
          </div>

          <span class="settings-section">Messages</span>
          <div class="settings-group">
            <span class="settings-label">Join / part / quit</span>
            <div class="settings-options">
              <button class="settings-option" data-setting="hidejoinpart" data-value="off">Show</button>
              <button class="settings-option" data-setting="hidejoinpart" data-value="on">Hide</button>
            </div>
          </div>
          <div class="settings-group">
            <label class="settings-label" for="highlight-words">Highlight words</label>
            <input type="text" id="highlight-words" class="settings-input" placeholder="word1, word2, …" autocomplete="off" spellcheck="false">
          </div>
          <div class="settings-group">
            <label class="settings-label" for="log-max">Max message history</label>
            <input type="number" id="log-max" class="settings-input" min="50" max="5000" step="50" value="500">
          </div>

          <span class="settings-section">Status</span>
          <div class="settings-group">
            <span class="settings-label">Browser notifications</span>
            <div class="settings-options">
              <button class="settings-option" data-setting="notifications" data-value="on">On</button>
              <button class="settings-option" data-setting="notifications" data-value="off">Off</button>
            </div>
          </div>
          <div class="settings-group">
            <label class="settings-label" for="autoaway-mins">Auto-away (minutes, 0 = off)</label>
            <input type="number" id="autoaway-mins" class="settings-input" min="0" max="120" step="1" value="5">
          </div>
          </section>
        </aside>
      </div>
      <footer id="input-bar">
        <div id="input-wrap">
          <span id="my-nick" aria-label="Current nick"></span>
          <input type="text" id="input" placeholder="Message or /command" autocomplete="off" spellcheck="false" aria-label="Message input">
        </div>
        <button type="button" id="send-btn" aria-label="Send message">⏎ Send</button>
      </footer>
    </main>

    <aside id="userlist-panel">
      <h2 id="userlist-header">Users</h2>
      <div id="userlist" role="list" aria-label="Users in channel"></div>
      <footer id="userlist-footer" class="hidden"></footer>
      <div id="lag-display" role="status" aria-live="polite">ping: -- ms</div>
    </aside>
  </div>

  <div id="restore-screen" class="hidden">
    <main>
      <div class="connect-box restore-box">
        <h1>wirgloo</h1>
        <p class="subtitle">Restoring session…</p>
        <div class="restore-spinner"></div>
        <button id="restore-cancel-btn" aria-label="Cancel restore and show connect form">Cancel — show connect form</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
