<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wirgloo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="connect-screen">
    <div class="connect-box">
      <h1>wirgloo</h1>
      <p class="subtitle">Web IRC Client</p>
      <div id="connect-error" class="error-msg hidden"></div>
      <form id="connect-form">
        <div class="field">
          <label>Network</label>
          <div class="select-row">
          <select id="network">
            <option value="libera">Libera.Chat</option>
            <option value="oftc">OFTC</option>
            <option value="rizon">Rizon</option>
            <option value="efnet">EFnet</option>
            <option value="quakenet">QuakeNet</option>
            <option value="dalnet">DALnet</option>
            <option value="undernet">Undernet</option>
            <option value="ircnet">IRCnet</option>
            <option value="geekshed">GeekShed</option>
            <option value="radiochat">RadioChat</option>
            <option value="sdf">SDF</option>
            <option value="custom">Custom…</option>
          </select>
          <button type="button" id="delete-profile-btn" class="hidden" title="Delete saved profile">×</button>
          </div>
        </div>
        <div class="field hidden" id="server-field">
          <label>Server</label>
          <input type="text" id="server" value="irc.libera.chat">
        </div>
        <div class="field-row">
          <div class="field" style="flex:0 0 auto">
            <label>Port</label>
            <input type="number" id="port" value="6697" min="1" max="65535" style="width:80px">
          </div>
          <div class="field toggle-field">
            <label>TLS</label>
            <label class="toggle">
              <input type="checkbox" id="tls" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="field toggle-field" id="noverify-field">
            <label>No verify</label>
            <label class="toggle">
              <input type="checkbox" id="noverify">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="field">
          <label>Nickname</label>
          <input type="text" id="nick" placeholder="yournick" required>
        </div>
        <div class="field">
          <label>Real Name <span class="field-optional">(optional)</span></label>
          <input type="text" id="realname" placeholder="Your Name">
        </div>
        <div class="field">
          <label>Authentication</label>
          <select id="auth-method">
            <option value="none">None</option>
            <option value="sasl">SASL PLAIN</option>
            <option value="nickserv">NickServ IDENTIFY</option>
            <option value="nickserv_cmd">NickServ (NICKSERV command)</option>
            <option value="server">Server password (/PASS)</option>
          </select>
        </div>
        <div class="field hidden" id="pass-field">
          <label>Password</label>
          <input type="password" id="pass" placeholder="password" autocomplete="current-password">
        </div>
        <button type="submit" id="connect-btn">Connect</button>
      </form>
      <div id="connect-version" class="app-version"></div>
    </div>

  </div>

  <div id="restore-screen" class="hidden">
    <div class="connect-box restore-box">
      <h1>wirgloo</h1>
      <p class="subtitle">Restoring session…</p>
      <div class="restore-spinner"></div>
      <button id="restore-cancel-btn">Cancel — show connect form</button>
    </div>
  </div>

  <div id="panel-backdrop" class="hidden"></div>
  <div id="chat-screen" class="hidden">
    <div id="sidebar">
      <div id="sidebar-header">
        <span id="my-nick"></span>
        <button id="nick-btn" title="Change nick">✎</button>
      </div>
      <div id="channel-list"></div>
      <div id="sidebar-footer">
        <button id="list-btn">≡ List</button>
        <button id="join-btn">+ Join</button>
        <button id="away-btn">⏾ Away</button>
        <button id="disconnect-btn">Disconnect</button>
      </div>
      <div id="sidebar-version" class="app-version"></div>
    </div>

    <div id="main">
      <div id="topic-bar">
        <button id="sidebar-toggle" class="panel-toggle" title="Channels">☰</button>
        <span id="target-name"></span>
        <span id="topic-text"></span>
        <button id="userlist-toggle" class="panel-toggle" title="Users">◉</button>
      </div>
      <div id="list-sort-bar" class="hidden">
        <span class="sort-label">Sort by</span>
        <button class="sort-btn" data-sort="users">Users ↓</button>
        <button class="sort-btn" data-sort="name">Name</button>
        <button class="sort-btn" data-sort="topic">Topic</button>
      </div>
      <div id="messages"></div>
      <button id="scroll-bottom" title="Scroll to bottom" aria-label="Scroll to bottom">↓</button>
      <div id="input-bar">
        <input type="text" id="input" placeholder="Message or /command" autocomplete="off" spellcheck="false">
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div id="userlist-panel">
      <div id="userlist-header">Users</div>
      <div id="userlist"></div>
      <div id="userlist-footer" class="hidden"></div>
      <div id="lag-display">ping: -- ms</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
